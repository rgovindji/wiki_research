<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1200, initial-scale=1">
<title>@newsflowned — FinTwit track record</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#05080d; }
body { display:flex; align-items:center; justify-content:center; min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
.card {
  width:1200px; height:630px; background:radial-gradient(120% 120% at 0% 0%, #131c2a 0%, #0a0e14 55%, #070a10 100%);
  color:#c9d4e0; padding:56px 60px; display:flex; flex-direction:column;
  border:1px solid #1e2733; position:relative; overflow:hidden;
}
.card:before { content:""; position:absolute; top:-60px; right:-60px; width:320px; height:320px;
  background:radial-gradient(circle, rgba(78,161,255,0.14), transparent 70%); }
.mono { font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; }
.top { display:flex; align-items:center; justify-content:space-between; }
.brandrow { display:flex; align-items:center; gap:14px; }
.logo { font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-size:24px; font-weight:700; letter-spacing:0.5px; color:#fff; }
.logo .dot { color:#4ea1ff; }
.tagpill { font-family:ui-monospace,Menlo,monospace; font-size:12px; letter-spacing:2px; color:#7d8a9c;
  border:1px solid #2a3645; border-radius:6px; padding:5px 10px; }
.rankbig { font-family:ui-monospace,Menlo,monospace; font-size:14px; letter-spacing:2px; color:#7d8a9c; }
.rankbig .rk { color:#f5c451; font-size:30px; font-weight:700; margin-left:6px; }
.handlebig { font-family:ui-monospace,"SF Mono",Menlo,monospace; font-size:76px; font-weight:700; color:#fff;
  margin-top:34px; line-height:1; letter-spacing:-1px; }
.handlebig .at { color:#3d4858; }
.dname { font-size:22px; color:#7d8a9c; margin-top:10px; }
.bigmetrics { display:flex; gap:54px; margin-top:auto; margin-bottom:8px; }
.bm-k { font-family:ui-monospace,Menlo,monospace; font-size:14px; letter-spacing:1.5px; color:#5a6678; }
.bm-v { font-family:ui-monospace,"SF Mono",Menlo,monospace; font-size:58px; font-weight:700; color:#fff; margin-top:8px; line-height:1; }
.calls { display:flex; gap:18px; margin-top:30px; }
.cc { flex:1; border:1px solid #1e2733; border-radius:10px; padding:16px 20px; background:rgba(255,255,255,0.02);
  display:flex; align-items:baseline; gap:14px; }
.cc-lbl { font-family:ui-monospace,Menlo,monospace; font-size:12px; letter-spacing:2px; font-weight:700; }
.cc-tk { font-family:ui-monospace,"SF Mono",Menlo,monospace; font-size:24px; font-weight:700; color:#fff; }
.cc-val { font-family:ui-monospace,"SF Mono",Menlo,monospace; font-size:24px; font-weight:700; margin-left:auto; }
.foot { display:flex; align-items:center; justify-content:space-between; margin-top:28px;
  border-top:1px solid #1e2733; padding-top:18px;
  font-family:ui-monospace,Menlo,monospace; font-size:13px; color:#5a6678; letter-spacing:0.5px; }
.foot-brand { color:#4ea1ff; font-weight:700; }
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <div class="brandrow">
      <span class="logo">FinTwit<span class="dot">.</span>Terminal</span>
      <span class="tagpill">ACCOUNTABILITY INDEX</span>
    </div>
    <div class="rankbig">RANK <span class="rk">—</span></div>
  </div>

  <div class="handlebig"><span class="at">@</span>newsflowned</div>
  <div class="dname">Newsflow Ned</div>

  <div class="bigmetrics">
    <div class="bm">
      <div class="bm-k">HIT RATE vs SPY</div>
      <div class="bm-v">—</div>
    </div>
    <div class="bm">
      <div class="bm-k">AVG EXCESS RETURN</div>
      <div class="bm-v" style="color:#7d8a9c">—</div>
    </div>
    <div class="bm">
      <div class="bm-k">EXPLICIT CALLS</div>
      <div class="bm-v">0</div>
    </div>
  </div>

  <div class="calls">
    <div class="cc"><div class="cc-lbl" style="color:#2fcf8f">BEST</div><div class="cc-tk">—</div></div>
    <div class="cc"><div class="cc-lbl" style="color:#ff5d6c">WORST</div><div class="cc-tk">—</div></div>
  </div>

  <div class="foot">
    <span>Benchmark-adjusted realized track record &middot; followers not used in ranking</span>
    <span class="foot-brand">fintwit.terminal</span>
  </div>
</div>
</body>
</html>
