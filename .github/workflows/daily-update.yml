name: Daily wiki update

# Runs the daily research sweep, commits any changes, and emails a styled
# summary to the configured recipient.
#
# Triggers:
#   - schedule: 22:00 UTC on weekdays (6 PM ET during DST, 5 PM ET otherwise)
#   - workflow_dispatch: manual run from the Actions UI; you can override the
#                        send_email flag and the email recipient
#
# Required GitHub Secrets:
#   ANTHROPIC_API_KEY        # for the Claude API call inside run_daily_update.py
#   AWS_ACCESS_KEY_ID        # IAM user with ses:SendEmail permission
#   AWS_SECRET_ACCESS_KEY
#   SES_SENDER               # verified SES identity, e.g. wiki@decideai.xyz
#   EMAIL_TO                 # default recipient, e.g. rgovindji@gmail.com
#
# Optional secrets:
#   ANTHROPIC_MODEL          # override default model
#   AWS_REGION               # override default us-east-1

on:
  # Scheduled cron DISABLED 2026-05-30 — daily automation is now AWS Lambda
  # via aws/template.yaml (EventBridge → wiki-daily-update Lambda → SES).
  # This workflow is kept around as a manual emergency fallback only.
  # To re-enable cron here, uncomment the schedule block below and disable
  # the EventBridge rule (aws/template.yaml EnableSchedule=false).
  #
  # schedule:
  #   - cron: '0 22 * * 1-5'
  workflow_dispatch:
    inputs:
      send_email:
        description: 'Send the email after the update'
        type: boolean
        default: true
      email_to:
        description: 'Override default recipient (leave blank to use EMAIL_TO secret)'
        type: string
        required: false
      skip_update:
        description: 'Skip the Claude-driven update step (just send the latest log entry)'
        type: boolean
        default: false

permissions:
  contents: write   # needed so the workflow can commit + push back to main

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  daily-update:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt boto3

      - name: Configure git identity
        run: |
          git config user.name  "wiki-bot"
          git config user.email "wiki-bot@decideai.xyz"

      - name: Run daily update (Claude API)
        if: ${{ github.event_name == 'schedule' || inputs.skip_update != true }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:   ${{ secrets.ANTHROPIC_MODEL || 'claude-opus-4-7' }}
        run: |
          python scripts/run_daily_update.py
        continue-on-error: false

      - name: Commit + push if changes
        id: commit
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Daily auto-update $(date -u +%Y-%m-%d)

          Automated daily research sweep from GitHub Actions workflow.

          Co-Authored-By: wiki-bot <wiki-bot@decideai.xyz>"
            git push origin HEAD:main
            echo "changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "[daily] no changes to commit"
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send daily email (SES)
        if: ${{ github.event_name == 'schedule' || inputs.send_email != false }}
        env:
          EMAIL_BACKEND:         ses
          SES_SENDER:            ${{ secrets.SES_SENDER }}
          EMAIL_TO:              ${{ inputs.email_to || secrets.EMAIL_TO }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            ${{ secrets.AWS_REGION || 'us-east-1' }}
        run: |
          python scripts/daily_email.py

      - name: Summary
        if: always()
        run: |
          echo "### Daily update run" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Changes committed: ${{ steps.commit.outputs.changes || 'n/a' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Repo head: $(git rev-parse --short HEAD)" >> "$GITHUB_STEP_SUMMARY"
